<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LeaseGov — Enterprise Contract Management</title>

    <!-- Google Fonts: Inter (body/UI) + JetBrains Mono (code/IDs/timestamps) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!--
      Flash Prevention Script — V4 Theme System.
      This script runs synchronously before React hydrates to prevent
      a flash of incorrect color mode on page load.

      Priority chain:
      1. leasegov_color_mode (user preference stored in localStorage)
      2. prefers-color-scheme (system preference)
      3. Default: 'light'

      The .dark class is applied to <html> before any paint.
      ThemeProvider will take over and manage the class reactively.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('leasegov_color_mode');
          var mode = stored;
          if (!mode || mode === 'system') {
            mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (mode === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // localStorage unavailable — default to light
        }
      })();
    </script>
  </head>

  <body style="overflow:hidden;overscroll-behavior:none;touch-action:pan-y;height:100%;width:100%;">
    <div id="root" style="height:100%;overflow:hidden;"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
